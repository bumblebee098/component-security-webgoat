name: "Main / Pull requests build"
on:
    pull_request:
        paths-ignore:
            - '.txt'
            - 'LICENSE'
            - 'docs/**'
        branches: [ main ]
    push:
        branches:
            - main

jobs:
    pre-commit:
        name: Pre-commit check
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout git repository
                uses: actions/checkout@v4.1.6
            -   name: Setup python
                uses: actions/setup-python@v6
                with:
                    python-version: "3.9"
            -   name: Setup Java
                uses: ./.github/actions/java-setup
                with:
                    cache: ""
            -   name: Pre-commit checks
                uses: pre-commit/action@v3.0.1
            -   name: pre-commit-c-lite
                uses: pre-commit-ci/lite-action@v1.1.0
                if: always()
    build:
        runs-on: ${{ matrix.os }}
        needs: [ pre-commit ]
        strategy:
            fail-fast: true
            matrix:
                os: [ ubuntu-latest ]
            max-parallel: 1
        steps:
            -   uses: actions/checkout@v4.1.6
            -   name: Set up JDK
                uses: ./.github/actions/java-setup
                with:
                    cache: 'maven'
            -   name: Build with Maven
                run: mvn --no-transfer-progress verify
    security:
        name: Security (SBOM + SAST + Vulnerability Scan)
        runs-on: ubuntu-latest
        needs: [ build ]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4.1.6

            # Install Docker tools

            - name: Pull Syft image (SBOM)
              run: docker pull anchore/syft

            - name: Pull Grype image (vuln scan)
              run: docker pull anchore/grype

            - name: Pull Semgrep image (SAST)
              run: docker pull returntocorp/semgrep

            # SBOM generation (Syft)
            - name: Generate SBOM with Syft
              run: |
                docker run --rm \
                -v "${PWD}:/src" \
                anchore/syft webgoat/webgoat \
                -o cyclonedx-json > sbom.json

            # Vulnerability scan (Grype)
            - name: Run Grype scan
              run: |
                docker run --rm \
                -v "${PWD}:/src" \
                anchore/grype sbom:/src/sbom.json \
                -o json > grype-report.json

            # SAST scan (Semgrep)
            - name: Run Semgrep SAST scan
              run: |
                docker run --rm \
                -v "${PWD}:/src" \
                returntocorp/semgrep \
                semgrep scan --config auto /src --json > semgrep-report.json

            # Upload reports as artifacts
            - name: Upload security reports
              uses: actions/upload-artifact@v4
              with:
                name: security-reports
                path: |
                  sbom.json
                  grype-report.json
                  semgrep-report.json

            # Critical vulnerabilities check
            - name: Fail on Critical vulnerabilities
              run: |
                CRITICAL=$(cat grype-report.json | grep -i "critical" | wc -l)
                echo "Critical findings: $CRITICAL"

                if [ "$CRITICAL" -gt 0 ]; then
                  echo "❌ Critical vulnerabilities found!"
                  exit 1
                fi
